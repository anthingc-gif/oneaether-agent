<!-- Agent URL banner - type your Railway/backend URL here -->
<div id="agent-banner">
  <div class="dot" id="agent-dot"></div>
  <span>Backend:</span>
  <input id="agent-url-input" type="text" placeholder="https://your-app.railway.app" value="https://oneaether-agent-production.up.railway.app" onfocus="if(!this.value)this.value=window.AGENT_URL" 
         
         onchange="updateAgentUrl(this.value)"/>
  <button onclick="testAgent()">Test</button>
</div>

<script>
  // Global agent URL — UI reads this
  // Auto-detect: if served from Railway, backend is same origin
  window.AGENT_URL = "https://oneaether-agent-production.up.railway.app";
  
  function updateAgentUrl(url) {
    window.AGENT_URL = url.trim();
    // Also update any React state if App is mounted
    if (window._setAgentUrl) window._setAgentUrl(url.trim());
  }
  
  // Set input to current origin on load
  window.addEventListener("load", function() {
    const inp = document.getElementById("agent-url-input");
    if (inp) inp.value = window.AGENT_URL;
    // Auto-test on load
    setTimeout(testAgentSilent, 1000);
  });

  async function testAgentSilent() {
    const url = window.AGENT_URL;
    const dot = document.getElementById("agent-dot");
    try {
      const r = await fetch(url + "/health", { signal: AbortSignal.timeout(5000) });
      if (r.ok) { dot.className = "dot on"; dot.style.background = ""; }
    } catch(e) { dot.style.background = "#ff4d6d"; }
  }

  async function testAgent() {
    const url = document.getElementById("agent-url-input").value.trim();
    const dot = document.getElementById("agent-dot");
    dot.style.background = "#f59e0b";
    try {
      const r = await fetch(url + "/health", { signal: AbortSignal.timeout(5000) });
      if (r.ok) {
        dot.className = "dot on";
        dot.style.background = "";
        alert("✓ Backend connected! Agent is running.");
      } else {
        throw new Error("HTTP " + r.status);
      }
    } catch(e) {
      dot.className = "dot";
      dot.style.background = "#ff4d6d";
      alert("✗ Could not reach backend: " + e.message + "\n\nMake sure your backend is deployed and the URL is correct.");
    }
  }
</script>

function evalRule(c, r) {
  const v = c[r.field], rv = Number(r.value);
  if(r.op==="gte") return v >= rv;
  if(r.op==="lte") return v <= rv;
  if(r.op==="gt")  return v > rv;
  if(r.op==="lt")  return v < rv;
  if(r.op==="eq")  return v === rv;

  .seg-rule-row select,.seg-rule-row input[type=number]{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;font-family:var(--fb)}
  .seg-rule-row select:focus,.seg-rule-row input:focus{border-color:var(--accent)}
  .ai-rec-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;transition:border-color .2s}

  .ai-rec-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;background:#7c4dff22;color:#a78bfa;margin-bottom:10px}
  .conf-bar{height:3px;border-radius:2px;background:var(--border);overflow:hidden;margin-top:6px}
  .conf-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#7c4dff,#a855f7);transition:width .8s}
  .seg-modal-overlay{position:fixed;inset:0;background:#000b;z-index:100;display:flex;align-items:center;justify-content:center}
  .seg-modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);width:540px;max-height:85vh;overflow-y:auto}
  .seg-modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .seg-modal-body{padding:20px 24px}
  .seg-modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
  .seg-color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
  .seg-color-swatch.sel{border-color:white;transform:scale(1.2)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .2s ease forwards}
  .checkbox{width:15px;height:15px;cursor:pointer;accent-color:var(--accent)}
  .connect-title{font-family:var(--fh);font-weight:700;font-size:16px;margin-bottom:6px}
  .connect-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px}
  .connect-icon{width:48px;height:48px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:22px}
  .connect-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;margin-bottom:16px}
  .dot{width:8px;height:8px;border-radius:50%}.dot-g{background:var(--accent)}.dot-grey{background:var(--text2)}
`;

// ─── MICRO COMPONENTS ────────────────────────────────────────────────────────
const SparkLine = ({values}) => {
  const max = Math.max(...values);
  return <div className="spark">{values.map((v,i)=><div key={i} className="spark-bar" style={{height:`${(v/max)*100}%`}}/>)}</div>;
};
const ChurnBar = ({risk}) => {
  const c = risk>70?"#ff4d6d":risk>40?"#f59e0b":"#00d9a3";
  return <div style={{display:"flex",alignItems:"center",gap:8}}>
    <div className="churn-bar"><div className="churn-fill" style={{width:`${risk}%`,background:c}}/></div>
    <span style={{fontSize:12,color:c}}>{risk}%</span>
  </div>;
};
const IntentTag = ({intent}) => {
  const cfg = INTENT_CONFIG[intent]; if(!cfg) return null;
  return <div className="intent-tag" style={{background:cfg.bg,color:cfg.color}}>⚡ {cfg.label}</div>;
};
const SegBadge = ({name,color}) => (
  <span style={{background:color+"22",color,padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:600,display:"inline-block"}}>{name}</span>
);

// ─── SEGMENT MODAL ───────────────────────────────────────────────────────────
function SegmentModal({segment, customers, onSave, onClose}) {
  const isNew = !segment;
  const [name,  setName]  = useState((segment && segment.name) || "");
  const [desc,  setDesc]  = useState((segment && segment.description) || "");
  const [color, setColor] = useState((segment && segment.color) || PALETTE[0]);
  const [icon,  setIcon]  = useState((segment && segment.icon) || "🏷️");
  const [type,  setType]  = useState((segment && segment.type) || "rule");
  const [rules, setRules] = useState((segment && segment.rules && segment.rules.length) ? segment.rules : [{field:"revenue",op:"gte",value:""}]);
  const [manIds,setManIds]= useState(new Set((segment && segment.customerIds) || []));

  const addRule    = ()     => setRules(r => [...r, {field:"revenue",op:"gte",value:""}]);
  const removeRule = i      => setRules(r => r.filter((_,j)=>j!==i));
  const updateRule = (i,k,v)=> setRules(r => r.map((row,j)=>j===i?{...row,[k]:v}:row));

  const matched = type==="rule"
    ? (customers||[]).filter(c => matchRules(c, rules.filter(r=>r.value!=="")))
    : (customers||[]).filter(c => manIds.has(c.id));

  const toggle = id => setManIds(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });

  const ICONS = ["🏷️","👑","💚","⭐","⚠️","💔","🚀","🎯","🐋","🔥","💎","🌱","🏆","🎪","🌟"];

  const save = () => {
    if(!name.trim()) return;
    onSave({
      id: (segment && segment.id) || `seg-${Date.now()}`,
      name, description:desc, color, icon, type,
      rules: type==="rule" ? rules.filter(r=>r.value!=="") : [],
      customerIds: type==="rule" ? matched.map(c=>c.id) : [...manIds],
      aiGenerated: false,
      createdAt: (segment && segment.createdAt) || new Date().toISOString().slice(0,10),
    });
  };

  return (
    <div className="seg-modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="seg-modal fade-in">
        <div className="seg-modal-head">
          <div style={{fontFamily:"var(--fh)",fontWeight:700,fontSize:16}}>{isNew?"Create Segment":"Edit Segment"}</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="seg-modal-body">
          <div className="form-group">
            <label className="form-label">Segment Name</label>
            <input className="form-input" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. VIP, Win-Back, High Potential..." />
          </div>
          <div className="form-group">
            <label className="form-label">Description</label>
            <input className="form-input" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Short description of this segment..." />
          </div>
          <div className="form-group">
            <label className="form-label">Icon</label>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {ICONS.map(ic=>(
                <button key={ic} onClick={()=>setIcon(ic)} style={{fontSize:18,padding:"4px 8px",borderRadius:6,cursor:"pointer",border:`2px solid ${icon===ic?"var(--accent)":"var(--border)"}`,background:"var(--bg2)"}}>
                  {ic}
                </button>
              ))}
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Color</label>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {PALETTE.map(c=>(
                <div key={c} className={`seg-color-swatch ${color===c?"sel":""}`} style={{background:c}} onClick={()=>setColor(c)}/>
              ))}
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Segment Type</label>
            <div className="tabs mb-2">
              <div className={`tab ${type==="rule"?"active":""}`} onClick={()=>setType("rule")}>Rule-Based (Auto)</div>
              <div className={`tab ${type==="manual"?"active":""}`} onClick={()=>setType("manual")}>Manual (Pick)</div>
            </div>
          </div>

          {type==="rule" && (
            <div>
              <label className="form-label">Rules — all conditions must match</label>
              {rules.map((rule,i)=>(
                <div key={i} className="seg-rule-row">
                  <select value={rule.field} onChange={e=>updateRule(i,"field",e.target.value)}>
                    {RULE_FIELDS.map(f=><option key={f.key} value={f.key}>{f.label}</option>)}
                  </select>
                  <select value={rule.op} onChange={e=>updateRule(i,"op",e.target.value)}>
                    {RULE_OPS.map(o=><option key={o.key} value={o.key}>{o.label}</option>)}
                  </select>
                  <input type="number" value={rule.value} onChange={e=>updateRule(i,"value",e.target.value)} placeholder="value" style={{width:80}}/>
                  {rules.length>1&&<button onClick={()=>removeRule(i)} style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>}
                </div>
              ))}
              <button className="btn btn-ghost btn-sm" onClick={addRule}>+ Add Condition</button>
              {matched.length>0 && (
                <div style={{marginTop:12,padding:"10px 12px",background:"var(--bg2)",borderRadius:"var(--r2)",fontSize:12}}>
                  <span style={{color:"var(--accent)",fontWeight:700}}>{matched.length} customer{matched.length!==1?"s":""}</span>
                  <span style={{color:"var(--text2)"}}> match: </span>
                  {matched.map(c=><span key={c.id} style={{marginRight:6}}>{c.name}</span>)}
                </div>
              )}
              {matched.length===0 && rules.some(r=>r.value!=="") && (
                <div style={{marginTop:12,padding:"10px 12px",background:"#ff4d6d0a",borderRadius:"var(--r2)",fontSize:12,color:"var(--danger)"}}>
                  No customers match these rules yet.
                </div>
              )}
            </div>
          )}

          {type==="manual" && (
            <div>
              <label className="form-label">Pick Customers</label>
              <div style={{border:"1px solid var(--border)",borderRadius:"var(--r2)",overflow:"hidden",maxHeight:260,overflowY:"auto"}}>
                {(customers||[]).map((c,i)=>(
                  <div key={c.id} onClick={()=>toggle(c.id)}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",cursor:"pointer",
                      background:manIds.has(c.id)?"#00d9a308":"transparent",
                      borderBottom:"1px solid var(--border)"}}>
                    <input type="checkbox" className="checkbox" checked={manIds.has(c.id)} onChange={()=>{}}/>
                    <div className={`wa-avatar ${getAV(i)}`} style={{width:28,height:28,fontSize:10,borderRadius:"50%"}}>{c.name.split(' ').map(n=>n[0]).join('')}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13}}>{c.name}</div>
                      <div style={{fontSize:11,color:"var(--text2)"}}>RM {c.revenue.toLocaleString()} · {c.orders} orders</div>
                    </div>
                    {manIds.has(c.id)&&<span style={{color:"var(--accent)"}}>✓</span>}
                  </div>
                ))}
              </div>
              <div style={{marginTop:8,fontSize:12,color:"var(--text2)"}}>{manIds.size} selected</div>
            </div>
          )}

          <div style={{marginTop:16,padding:"10px 14px",background:"var(--bg2)",borderRadius:"var(--r2)",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>{icon}</span>
            <div>
              <div style={{fontSize:11,color:"var(--text2)",marginBottom:3}}>Preview</div>
              <SegBadge name={name||"Segment Name"} color={color}/>
            </div>
          </div>
        </div>
        <div className="seg-modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={save} disabled={!name.trim()}>{isNew?"Create Segment":"Save Changes"}</button>
        </div>
      </div>
    </div>
  );
}

// ─── SEGMENTS SCREEN ─────────────────────────────────────────────────────────
function SegmentsScreen({customers, setCustomers}) {
  const [segments,   setSegments]   = useState(INITIAL_SEGMENTS);
  const [view,       setView]       = useState("board");
  const [showModal,  setShowModal]  = useState(false);
  const [editSeg,    setEditSeg]    = useState(null);
  const [aiRecs,     setAiRecs]     = useState(AI_RECS);
  const [aiRunning,  setAiRunning]  = useState(false);
  const [aiDone,     setAiDone]     = useState(false);
  const [dragCust,   setDragCust]   = useState(null);
  const [dragOver,   setDragOver]   = useState(null);
  const [filterSeg,  setFilterSeg]  = useState(null);

  const runAI = () => { setAiRunning(true); setTimeout(()=>{setAiRunning(false);setAiDone(true);},2000); };

  const acceptRec = rec => {
    setSegments(s=>[...s,{...rec,aiGenerated:true}]);
    setCustomers(cs=>cs.map(c=>rec.customerIds.includes(c.id)?{...c,segment:rec.name}:c));
    setAiRecs(r=>r.filter(x=>x.id!==rec.id));
  };

  const saveSeg = seg => {
    setSegments(s=>{
      const exists=s.find(x=>x.id===seg.id);
      return exists ? s.map(x=>x.id===seg.id?seg:x) : [...s,seg];
    });
    setCustomers(cs=>cs.map(c=>seg.customerIds.includes(c.id)?{...c,segment:seg.name}:c));
    setShowModal(false); setEditSeg(null);
  };

  const deleteSeg = id => {
    if(!confirm("Delete this segment?")) return;
    setSegments(s=>s.filter(x=>x.id!==id));
  };

  const drop = segId => {
    if(!dragCust) return;
    const seg = segments.find(s=>s.id===segId); if(!seg) return;
    setSegments(segs=>segs.map(s=>
      s.id===segId
        ? {...s, customerIds:[...new Set([...s.customerIds,dragCust.id])]}
        : {...s, customerIds:s.customerIds.filter(id=>id!==dragCust.id)}
    ));
    setCustomers(cs=>cs.map(c=>c.id===dragCust.id?{...c,segment:seg.name}:c));
    setDragCust(null); setDragOver(null);
  };

  const filteredCustomers = filterSeg
    ? (customers||[]).filter(c=>{ const s=segments.find(x=>x.id===filterSeg); return (s && s.customerIds).includes(c.id); })
    : customers;

  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 52px)",overflow:"hidden"}}>
      {/* Toolbar */}
      <div style={{padding:"14px 24px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:12,background:"var(--bg2)",flexShrink:0}}>
        <div className="tabs">
          <div className={`tab ${view==="board"?"active":""}`} onClick={()=>setView("board")}>🗂 Board</div>
          <div className={`tab ${view==="list"?"active":""}`}  onClick={()=>setView("list")}>📋 List</div>
          <div className={`tab ${view==="ai"?"active":""}`}    onClick={()=>setView("ai")}>✦ AI Recommendations {aiRecs.length>0&&<span style={{marginLeft:4,background:"#7c4dff",color:"white",fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:10}}>{aiRecs.length}</span>}</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:10}}>
          {view==="ai"&&!aiDone&&<button className="btn btn-ai" onClick={runAI} disabled={aiRunning}>{aiRunning?<><span>✦</span> Analysing...</>:"✦ Run AI Analysis"}</button>}
          <button className="btn btn-primary" onClick={()=>{setEditSeg(null);setShowModal(true);}}>+ New Segment</button>
        </div>
      </div>

      {/* BOARD */}
      {view==="board" && (
        <div style={{padding:"20px 24px",overflowX:"auto",flex:1,overflowY:"hidden"}}>
          <div className="seg-kanban">
            {segments.map(seg=>{
              const sc = (customers||[]).filter(c=>seg.customerIds.includes(c.id));
              const rev = (sc||[]).reduce((a,c)=>a+(c.revenue||0),0);
              return (
                <div key={seg.id} className="seg-col"
                  style={{borderTop:`3px solid ${seg.color}`,boxShadow:dragOver===seg.id?`0 0 0 2px ${seg.color}`:"none"}}
                  onDragOver={e=>{e.preventDefault();setDragOver(seg.id);}}
                  onDrop={()=>drop(seg.id)}
                  onDragLeave={()=>setDragOver(null)}>
                  <div className="seg-col-header">
                    <span style={{fontSize:16}}>{seg.icon}</span>
                    <div className="seg-col-title" style={{color:seg.color}}>{seg.name}</div>
                    <div className="seg-col-count">{sc.length}</div>
                    <button className="btn btn-ghost btn-sm" style={{padding:"3px 7px"}} onClick={()=>{setEditSeg(seg);setShowModal(true);}}>✏</button>
                    <button className="btn btn-danger btn-sm" style={{padding:"3px 7px"}} onClick={()=>deleteSeg(seg.id)}>🗑</button>
                  </div>
                  <div style={{padding:"6px 12px 6px",borderBottom:"1px solid var(--border)",fontSize:11,color:"var(--text2)",flexShrink:0,display:"flex",justifyContent:"space-between"}}>
                    <span>RM {rev.toLocaleString()}</span>
                    {seg.aiGenerated&&<span style={{color:"#a78bfa",fontWeight:700}}>✦ AI</span>}
                    {seg.type==="rule"&&<span style={{color:"var(--text2)"}}>auto</span>}
                  </div>
                  <div className="seg-col-body">
                    {sc.map((c,i)=>(
                      <div key={c.id} className={`seg-cust-card${(dragCust && dragCust.id)===c.id?" dragging":""}`}
                        draggable onDragStart={()=>setDragCust(c)} onDragEnd={()=>setDragCust(null)}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                          <div className={`wa-avatar ${getAV(i)}`} style={{width:24,height:24,fontSize:9,borderRadius:"50%",flexShrink:0}}>{c.name.split(' ').map(n=>n[0]).join('')}</div>
                          <div style={{fontWeight:600,fontSize:12,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                        </div>
                        <div style={{fontSize:11,color:"var(--text2)",display:"flex",justifyContent:"space-between",marginBottom:4}}>
                          <span>RM {c.revenue.toLocaleString()}</span><span>{c.orders} orders</span>
                        </div>
                        <ChurnBar risk={c.churnRisk}/>
                      </div>
                    ))}
                    {sc.length===0&&(
                      <div className={`seg-drop-zone${dragOver===seg.id?" over":""}`}>Drop customers here</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{marginTop:10,fontSize:12,color:"var(--text2)"}}>💡 Drag & drop customer cards between columns to reassign segments</div>
        </div>
      )}

      {/* LIST */}
      {view==="list" && (
        <div style={{padding:"20px 24px",flex:1,overflow:"auto"}}>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            <button className={`btn btn-sm ${!filterSeg?"btn-primary":"btn-ghost"}`} onClick={()=>setFilterSeg(null)}>All ({customers.length})</button>
            {segments.map(seg=>(
              <button key={seg.id} className={`btn btn-sm ${filterSeg===seg.id?"btn-primary":"btn-ghost"}`}
                onClick={()=>setFilterSeg(filterSeg===seg.id?null:seg.id)}
                style={filterSeg===seg.id?{background:seg.color,color:"#000"}:{}}>
                {seg.icon} {seg.name} ({(customers||[]).filter(c=>seg.customerIds.includes(c.id)).length})
              </button>
            ))}
          </div>
          <div className="card" style={{padding:0}}>
            <table><thead><tr><th>Customer</th><th>Segment</th><th>Revenue</th><th>Orders</th><th>Churn Risk</th><th>Last Order</th><th>Change Segment</th></tr></thead>
            <tbody>{filteredCustomers.map((c,i)=>{
              const seg = segments.find(s=>s.customerIds.includes(c.id));
              return (
                <tr key={c.id}>
                  <td><div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div className={`wa-avatar ${getAV(i)}`} style={{width:30,height:30,fontSize:10,borderRadius:"50%"}}>{c.name.split(' ').map(n=>n[0]).join('')}</div>
                    <div><div style={{fontWeight:600}}>{c.name}</div><div style={{fontSize:11,color:"var(--text2)"}}>{c.phone}</div></div>
                  </div></td>

function CustomersScreen({ conn = {} }) {
  const [customers, setCustomers] = useState([]);
  const [total, setTotal]         = useState(0);
  const [page, setPage]           = useState(1);
  const [search, setSearch]       = useState("");
  const [loading, setLoading]     = useState(false);
  const [syncing, setSyncing]     = useState(false);
  const [lastSync, setLastSync]   = useState(null);
  const [error, setError]         = useState("");
  const agentUrl = conn.agentUrl || window.AGENT_URL || "";
  const PER_PAGE = 50;

  const fetchCustomers = async (p = 1, q = search) => {
    if (!agentUrl) return;
    setLoading(true); setError("");
    try {
      const res = await fetch(`${agentUrl}/data/customers?page=${p}&per_page=${PER_PAGE}&search=${encodeURIComponent(q)}`);
      if (!res.ok) throw new Error("Failed to fetch");
      const data = await res.json();
      setCustomers(data.customers || []);
      setTotal(data.total || 0);
      setPage(p);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const syncFromSNC = async () => {
    if (!agentUrl) return;
    setSyncing(true); setError("");
    try {
      await fetch(`${agentUrl}/sync/customers`, { method: "POST" });
      setLastSync(new Date().toLocaleTimeString());
      // Poll every 2s until customers appear (max 30s)
      let attempts = 0;
      const poll = async () => {
        attempts++;
        await fetchCustomers(1, search);
        if (customers.length === 0 && attempts < 15) {
          setTimeout(poll, 2000);
        } else {
          setSyncing(false);
        }
      };
      setTimeout(poll, 2000);
    } catch(e) {
      setError("Sync failed: " + e.message);
      setSyncing(false);
    }
  };

  useEffect(() => { fetchCustomers(1, ""); }, [agentUrl]);

  const filtered = customers; // filtering done server-side

  return (
    <div className="content">
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <input className="search-input" style={{flex:1,minWidth:200}} placeholder="Search customers..."
          value={search} onChange={e=>setSearch(e.target.value)}
          onKeyDown={e=>e.key==="Enter" && fetchCustomers(1,search)}/>
        <button className="btn btn-ghost btn-sm" onClick={()=>fetchCustomers(1,search)} disabled={loading}>
          {loading ? "Loading..." : "🔍 Search"}
        </button>
        <button className="btn btn-primary btn-sm" onClick={syncFromSNC} disabled={syncing}
          title="Pull latest customers from SellnChill ERP">
          {syncing ? "⏳ Syncing..." : "↻ Sync from SNC"}
        </button>
        {lastSync && <span style={{fontSize:11,color:"var(--accent)"}}>Last sync: {lastSync}</span>}
      </div>

      {error && <div style={{background:"#ef444420",border:"1px solid #ef444440",borderRadius:"var(--r2)",padding:"10px 14px",color:"#ef4444",fontSize:12,marginBottom:12}}>{error}</div>}

      {syncing && (
        <div style={{background:"#f59e0b15",border:"1px solid #f59e0b30",borderRadius:"var(--r2)",padding:"10px 14px",color:"var(--warn)",fontSize:12,marginBottom:12}}>
          ⏳ Syncing customers from SellnChill... This may take a moment. Results will appear automatically.
        </div>
      )}

      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontWeight:700,fontSize:13}}>Customers <span style={{color:"var(--text2)",fontWeight:400}}>({total} total)</span></div>
          <div style={{fontSize:11,color:"var(--text2)"}}>
            {customers.length > 0 ? `Showing ${(page-1)*PER_PAGE+1}–${Math.min(page*PER_PAGE,total)} of ${total}` : ""}
          </div>
        </div>

        {customers.length === 0 && !loading && (
          <div style={{padding:40,textAlign:"center",color:"var(--text2)"}}>
            {agentUrl ? (
              <>
                <div style={{fontSize:32,marginBottom:12}}>👥</div>
                <div style={{fontWeight:600,marginBottom:8}}>No customers yet</div>
                <div style={{fontSize:12,marginBottom:16}}>Click <strong>↻ Sync from SNC</strong> to pull your customers from SellnChill ERP</div>
                <button className="btn btn-primary" onClick={syncFromSNC} disabled={syncing}>
                  {syncing ? "Syncing..." : "↻ Sync Now"}
                </button>
              </>
            ) : (
              <div>Connect your backend first to load customers</div>
            )}
          </div>
        )}

        {customers.length > 0 && (
          <table>
            <thead>
              <tr>
                <th>Customer</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Branch</th>
                <th>Credit Term</th>
                <th>Status</th>
                <th>Last Synced</th>
              </tr>
            </thead>
            <tbody>
              {(customers||[]).map((c,i) => (
                <tr key={c.customer_id || i}>
                  <td><div style={{fontWeight:600}}>{c.customer_name || "—"}</div>
                    <div style={{fontSize:10,color:"var(--text2)"}}>{c.store || c.customer_id}</div>
                  </td>
                  <td>{c.phone || "—"}</td>
                  <td style={{fontSize:11}}>{c.email || "—"}</td>
                  <td>{c.branch_name || "—"}</td>
                  <td>{c.credit_term || "—"}</td>
                  <td>
                    <span style={{
                      padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,
                      background: c.status==="Active" ? "#00d9a320" : "#ef444420",
                      color:      c.status==="Active" ? "var(--accent)"  : "#ef4444",
                    }}>{c.status || "Active"}</span>
                  </td>
                  <td style={{fontSize:10,color:"var(--text2)"}}>{c.synced_at ? c.synced_at.split("T")[0] : "—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {/* Pagination */}
      {total > PER_PAGE && (
        <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:16}}>
          <button className="btn btn-ghost btn-sm" disabled={page===1} onClick={()=>fetchCustomers(page-1,search)}>← Prev</button>
          <span style={{padding:"4px 12px",fontSize:12,color:"var(--text2)"}}>Page {page} of {Math.ceil(total/PER_PAGE)}</span>
          <button className="btn btn-ghost btn-sm" disabled={page*PER_PAGE>=total} onClick={()=>fetchCustomers(page+1,search)}>Next →</button>
        </div>
      )}
    </div>
  );
}

function AIInsightsScreen() {
  const [msgs, setMsgs] = useState([{role:"ai",text:"Hi! Ask me anything about customers, products, or segments. Try: *'Who might churn?'* or *'Show segment insights'*"}]);

  const ref = useRef(null);
  useEffect(()=>{ref.current && ref.current.scrollIntoView({behavior:"smooth"});},[msgs]);
  const send = () => {
    if(!inp.trim()) return;
    const q=inp.trim(); setMsgs(m=>[...m,{role:"user",text:q}]); setInp(""); setTyping(true);
    setTimeout(()=>{
      const lower=q.toLowerCase();
      let reply="I've analysed your CRM data. Would you like specific insights on customers, segments, or products?";
      for(const [k,v] of Object.entries(AI_RESP)) if(lower.includes(k)){reply=v;break;}

  return (
    <div style={{display:"flex",height:"calc(100vh - 52px)",overflow:"hidden"}}>
      <div style={{flex:1,display:"flex",flexDirection:"column"}}>
        <div className="ai-messages" style={{flex:1}}>
