  // Create Order modal state
  const [showCreateOrder, setShowCreateOrder] = useState(false);
  const [createOrderChat, setCreateOrderChat] = useState(null);
  const [orderItems, setOrderItems]           = useState([{name:"",qty:1,uom:"unit"}]);
  const [orderDelivery, setOrderDelivery]     = useState("");
  const [orderLoading, setOrderLoading]       = useState(false);
  const [orderResult, setOrderResult]         = useState(null);
  const [assignChat, setAssignChat]   = useState(null);
  const [customers,  setCustomers]    = useState([]);
  const [branches,   setBranches]     = useState([]);
  const [assignments, setAssignments] = useState({}); // chat_id → {customer, branch, customer_id, branch_id, store_id}
  const [assignLoading, setAssignLoading] = useState(false);
  const [groupMembers, setGroupMembers]   = useState({}); // chat_id → [members]

  // ── Fetch customers + branches from SNC for assignment ──
  const fetchCustomersAndBranches = async () => {
    const agentUrl = conn.agentUrl || window.AGENT_URL || "";
    if (!agentUrl) return;
    setAssignLoading(true);
    try {
      // Load from our local DB (synced from SNC)
      const res = await fetch(`${agentUrl}/data/customers?per_page=200`);
      if (res.ok) {
        const d = await res.json();
        const list = d.customers || [];
        console.log("Customers for assign loaded:", list.length, list[0]);
        if (list.length === 0) {
          console.warn("No customers in DB — trigger a sync first");
        }
        setCustomers(list.map(c => ({
          id:         c.customer_id || c.store_id,
          store_id:   c.store_id || "",
          branch_id:  c.branch_id || "",
          label:      c.customer_name || c.store || "Unknown",
          branch:     c.branch_name || "Main Branch",
          branches:   c.branch_id ? [{branch_id: c.branch_id, branch_name: c.branch_name || "Main Branch"}] : [],
        })));
      }
    } catch(e) { console.warn("Fetch customers failed:", e); }
    finally { setAssignLoading(false); }
  };

  const openAssignModal = async (chat) => {
    setAssignChat(chat);
    setShowAssign(true);
    if (customers.length === 0) await fetchCustomersAndBranches();
    // Fetch group members if it's a group
    if (String(chat.id).endsWith("@g.us") && !groupMembers[chat.id]) {
      const agentUrl = conn.agentUrl || window.AGENT_URL || "";
      try {
        const res = await fetch(`${agentUrl}/proxy/whapi/group/${encodeURIComponent(chat.id)}`);
        if (res.ok) {
          const d = await res.json();
          const members = (d.participants || []).map(p => ({
            id:    p.id,
            phone: String(p.id).replace("@s.whatsapp.net",""),
            name:  p.name || String(p.id).replace("@s.whatsapp.net",""),
            role:  p.rank || "member",
            assignedCustomer: (assignments[p.id] && assignments[p.id].customer) || null,
            assignedBranch:   (assignments[p.id] && assignments[p.id].branch) || null,
          }));
          setGroupMembers(g => ({...g, [chat.id]: members}));
        }
      } catch(e) { console.warn("Group members fetch failed:", e); }
    }
  };

  const saveAssignment = (chatId, memberId, field, value, extra={}) => {
    setAssignments(a => ({
      ...a,
      [memberId || chatId]: {
        ...(a[memberId || chatId] || {}),
        [field]: value,
        ...extra,
      }
    }));
  };

  const confirmAssignment = async () => {
    // Save assignments to backend agent so orders use correct store_id/branch_id
    const agentUrl = conn.agentUrl || window.AGENT_URL || "";
    if (agentUrl) {
      try {
        await fetch(`${agentUrl}/assignments`, {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({assignments})
        });
      } catch(e) {}
    }
    setShowAssign(false);
  };

  // ── Map raw Whapi objects to our internal format ──
  const mapChat = c => ({
    id:      c.id,
    name:    c.name || String(c.id).replace("@s.whatsapp.net","").replace("@g.us",""),
    phone:   String(c.id).replace("@s.whatsapp.net","").replace("@g.us",""),
    avatar:  ((c.name||"?").split(" ").map(w=>w[0]).join("").slice(0,2)||"?").toUpperCase(),
    lastMsg: (c.last_message && c.last_message.text && c.last_message.text.body) || (c.last_message && c.last_message.body) || (c.last_message && c.last_message.caption) || "",
    time:    (c.last_message && c.last_message.timestamp)
               ? new Date(c.last_message.timestamp * 1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})
               : "",
    unread:  c.unread_count || 0,
    online:  false,
    messages:[],
  });

  const mapMsg = m => ({
    id:   m.id,
    from: m.from_me ? "us" : "them",
    text: (m.text && m.text.body)
          || (m.image && m.image.caption)
          || (m.video && m.video.caption)
          || (m.document && m.document.caption)
          || (m.type==="audio"||m.type==="voice" ? "🎙️ Voice message" : null)
          || (m.type==="image" ? "📷 Image" : null)
          || (m.type==="video" ? "🎬 Video" : null)
          || (m.type==="document" ? "📎 "+((m.document && m.document.file_name)||"Document") : null)
          || "["+( m.type||"media")+"]",
    time: m.timestamp ? new Date(m.timestamp*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : "",
    intent: null,
  });

  // ── Whapi caller: tries direct → proxy → shows clear error ──
  // Direct call works if browser and gate.whapi.cloud are reachable (no CORS issue on some setups).
  // Proxy call goes via agentUrl/proxy/whapi/* which the agent must expose (see whapi_proxy_routes.py).
  const agentUrl = conn.agentUrl || window.AGENT_URL || "http://158.140.133.82:8000";
  const wapiHdr  = { Authorization: `Bearer ${wapiToken}`, Accept: "application/json", "Content-Type": "application/json" };
  const proxyHdr = { "Content-Type": "application/json", "X-Whapi-Token": wapiToken, "X-Whapi-Url": wapiUrl };

  // Try URL1 first, fall back to URL2
  const fetchWithFallback = async (directUrl, proxyUrl, opts1 = {}, opts2 = {}) => {
    // 1. Direct to Whapi
    try {
      const r = await fetch(directUrl, { ...opts1, signal: AbortSignal.timeout(8000) });
      if (r.status === 401) throw new Error("401_UNAUTH");
      if (r.ok) return r;
    } catch(e) {
      if (e.message === "401_UNAUTH") throw e;
      // CORS or network — fall through to proxy
    }
    // 2. Via agent proxy
    try {
      const r = await fetch(proxyUrl, { ...opts2, signal: AbortSignal.timeout(8000) });
      if (r.status === 401) throw new Error("401_UNAUTH");
      if (r.status === 404) throw new Error("404_PROXY"); // proxy routes not installed yet
      if (r.ok) return r;
      throw new Error(`HTTP ${r.status}`);
    } catch(e) {
      if (e.message === "401_UNAUTH") throw new Error("Invalid Whapi token — re-check in WA Settings");
      if (e.message === "404_PROXY")  throw new Error("Proxy not found — add whapi_proxy_routes.py to your agent");
      throw new Error("Agent unreachable — is it running at " + agentUrl + "?");
    }
  };

  const fetchChats = async () => {
    if (!wapiOk || !wapiToken) return;
    setLoading(true); setFetchErr("");
    try {
      const res = await fetchWithFallback(
        `${wapiUrl}/chats?count=50&offset=0`,
        `${agentUrl}/proxy/whapi/chats?count=50`,
        { headers: wapiHdr },
        { headers: proxyHdr }
      );
      const data = await res.json();
      const chatsArr = Array.isArray((data && data.chats)) ? data.chats : Array.isArray(data) ? data : [];
      if (chatsArr.length > 0) {
        const mapped = chatsArr.map(mapChat);
        setChats(mapped);
        if (!active || !mapped.find(m => m.id === active.id)) setActive(mapped[0]);
      }
      setLastFetch(new Date());
    } catch(e) {
      setFetchErr(e.message);
    } finally {
      setLoading(false);
    }
  };

  const fetchMessages = async (chatId) => {
    if (!wapiOk || !wapiToken || !chatId) return;
    try {
      const res = await fetchWithFallback(
        `${wapiUrl}/messages/list?chat_id=${encodeURIComponent(chatId)}&count=50`,
        `${agentUrl}/proxy/whapi/messages?chat_id=${encodeURIComponent(chatId)}&count=50`,
        { headers: wapiHdr },
        { headers: proxyHdr }
      );
      const data = await res.json();
      const msgsArr = Array.isArray((data && data.messages)) ? data.messages : Array.isArray(data) ? data : [];
      if (msgsArr.length > 0) {
        const mapped = [...msgsArr].reverse().map(mapMsg);
        setChats(cs => cs.map(c => c.id === chatId ? {...c, messages: mapped, unread: 0} : c));
        setLastFetch(new Date());
      }
    } catch(e) { /* silent on message fetch fail — keep existing */ }
  };

  // ── Auto-fetch on mount & every 30s when connected ──
  useEffect(() => {
    if (wapiOk) {
      fetchChats();
      const interval = setInterval(fetchChats, 30000);
      return () => clearInterval(interval);
    }
  }, [wapiOk, wapiToken]);

  // ── Fetch messages when switching chats ──
  useEffect(() => {
    if (wapiOk && (active && active.id)) fetchMessages(active.id);
  }, [(active && active.id), wapiOk]);

  // ── Scroll to bottom on new messages ──
  useEffect(() => {
    msgEndRef.current && msgEndRef.current.scrollIntoView({ behavior: "smooth" });
  }, [chats, (active && active.id)]);

  const cur = chats.find(c=>String(c.id)===String(active && active.id));
  const filteredChats = chats.filter(c =>
    c.name.toLowerCase().includes(searchQ.toLowerCase()) ||
    c.lastMsg.toLowerCase().includes(searchQ.toLowerCase())
  );

  const send = async () => {
    if(!inp.trim()||!active) return;
    const text = inp.trim();
    setInp("");
    const newMsg = { id:Date.now(), from:"us", text, time: new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}), intent:null };
    setChats(cs=>cs.map(c=>c.id===active.id ? {...c, messages:[...c.messages, newMsg], lastMsg:text} : c));
    // Send via Whapi if connected
    if (wapiOk && wapiToken && conn.erpCompanyId) {
      setSending(true);
      try {
        try {
          await fetchWithFallback(
            `${wapiUrl}/messages/text`,
            `${agentUrl}/proxy/whapi/send`,
            { method:"POST", headers: wapiHdr,  body: JSON.stringify({ to: active.id, body: text }) },
            { method:"POST", headers: proxyHdr, body: JSON.stringify({ to: active.id, body: text }) }
          );
        } catch(_) {}
      } catch(e) {} finally { setSending(false); }
    }
  };

  const totalUnread = (chats||[]).reduce((a,c)=>a+(c.unread||0),0);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 52px)",overflow:"hidden"}}>
      {/* ── Create Order Modal ── */}
      {showCreateOrder && createOrderChat && (
        <div style={{position:"fixed",inset:0,background:"#000a",zIndex:1001,display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={()=>{setShowCreateOrder(false);setOrderResult(null);setOrderItems([{name:"",qty:1,uom:"unit"}]);}}>
          <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"var(--r)",width:520,maxHeight:"80vh",overflow:"auto",padding:24}}
            onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <div>
                <div style={{fontFamily:"var(--fh)",fontWeight:700,fontSize:16}}>🛒 Create Order</div>
                <div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>
                  {createOrderChat.name} · {assignments[createOrderChat.id] ? assignments[createOrderChat.id].customer : "No customer assigned"}
                </div>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={()=>{setShowCreateOrder(false);setOrderResult(null);}}>✕</button>
            </div>

            {!assignments[createOrderChat.id] && (
              <div style={{background:"#f59e0b15",border:"1px solid #f59e0b40",borderRadius:"var(--r2)",padding:"10px 14px",color:"var(--warn)",fontSize:12,marginBottom:12}}>
                ⚠️ No customer assigned to this chat. Please assign a customer first.
              </div>
            )}

            {orderResult ? (
              <div style={{textAlign:"center",padding:"20px 0"}}>
                {orderResult.success ? (
                  <>
                    <div style={{fontSize:40,marginBottom:12}}>✅</div>
                    <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>Order Placed!</div>
                    <div style={{color:"var(--accent)",fontFamily:"monospace",fontSize:14,marginBottom:16}}>{orderResult.order_number}</div>
                    <button className="btn btn-primary" onClick={()=>{setShowCreateOrder(false);setOrderResult(null);setOrderItems([{name:"",qty:1,uom:"unit"}]);}}>Done</button>
                  </>
                ) : (
                  <>
                    <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
                    <div style={{fontWeight:700,marginBottom:8}}>Order Failed</div>
                    <div style={{fontSize:12,color:"var(--text2)",marginBottom:16}}>{orderResult.error}</div>
                    <button className="btn btn-ghost" onClick={()=>setOrderResult(null)}>Try Again</button>
                  </>
                )}
              </div>
            ) : (
              <>
                <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:1,color:"var(--text2)",fontWeight:700,marginBottom:10}}>Order Items</div>
                {orderItems.map((item,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 32px",gap:8,marginBottom:8,alignItems:"center"}}>
                    <input className="form-input" placeholder="Product name..." value={item.name}
                      onChange={e=>{const a=[...orderItems];a[i]={...a[i],name:e.target.value};setOrderItems(a);}}/>
                    <input className="form-input" type="number" min="1" placeholder="Qty" value={item.qty}
                      onChange={e=>{const a=[...orderItems];a[i]={...a[i],qty:parseInt(e.target.value)||1};setOrderItems(a);}}/>
                    <select className="form-input" value={item.uom}
                      onChange={e=>{const a=[...orderItems];a[i]={...a[i],uom:e.target.value};setOrderItems(a);}}>
                      {["unit","pkt","box","kg","pcs","bag","can","bottle","carton"].map(u=><option key={u} value={u}>{u}</option>)}
                    </select>
                    <button className="btn btn-ghost btn-sm" style={{padding:"4px 8px",color:"#ef4444"}}
                      onClick={()=>setOrderItems(orderItems.filter((_,j)=>j!==i))}>✕</button>
                  </div>
                ))}
                <button className="btn btn-ghost btn-sm" style={{marginBottom:16}} onClick={()=>setOrderItems([...orderItems,{name:"",qty:1,uom:"unit"}])}>
                  + Add Item
                </button>

                <div style={{marginBottom:16}}>
                  <label style={{fontSize:11,color:"var(--text2)",display:"block",marginBottom:4}}>DELIVERY DATE</label>
                  <input className="form-input" type="date" value={orderDelivery}
                    onChange={e=>setOrderDelivery(e.target.value)}
                    min={new Date().toISOString().split("T")[0]}/>
                </div>

                <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                  <button className="btn btn-ghost" onClick={()=>setShowCreateOrder(false)}>Cancel</button>
                  <button className="btn btn-primary" disabled={orderLoading || orderItems.filter(x=>x.name.trim()).length===0}
                    onClick={async ()=>{
                      setOrderLoading(true);
                      const agentUrl = conn.agentUrl || window.AGENT_URL || "";
                      try {
                        const res = await fetch(`${agentUrl}/orders/create`, {
                          method: "POST",
                          headers: {"Content-Type":"application/json"},
                          body: JSON.stringify({
                            chat_id:       createOrderChat.id,
                            items:         orderItems.filter(x=>x.name.trim()),
                            delivery_date: orderDelivery,
                            sender_name:   createOrderChat.name,
                          })
                        });
                        const data = await res.json();
                        if (res.ok && data.order_number) {
                          setOrderResult({success:true, order_number: data.order_number});
                        } else {
                          setOrderResult({success:false, error: data.detail || data.error || "Order creation failed"});
                        }
                      } catch(e) {
                        setOrderResult({success:false, error: e.message});
                      } finally {
                        setOrderLoading(false);
                      }
                    }}>
                    {orderLoading ? "⏳ Placing..." : "✅ Place Order"}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* ── Assign Customer Modal ── */}
      {showAssign && assignChat && (
        <div style={{position:"fixed",inset:0,background:"#000a",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowAssign(false)}>
          <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"var(--r)",width:560,maxHeight:"80vh",overflow:"auto",padding:24}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div>
                <div style={{fontFamily:"var(--fh)",fontWeight:700,fontSize:16}}>Assign Customer</div>
                <div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>{assignChat.name} · {assignChat.id}</div>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={()=>setShowAssign(false)}>✕</button>
            </div>

            {assignLoading && <div style={{color:"var(--accent)",fontSize:13,marginBottom:12}}>⏳ Loading customers...</div>}
            {!assignLoading && customers.length === 0 && (
              <div style={{background:"#f59e0b15",border:"1px solid #f59e0b30",borderRadius:"var(--r2)",padding:"10px 14px",marginBottom:12}}>
                <div style={{fontSize:12,color:"var(--warn)",marginBottom:8}}>⚠️ No customers loaded. Sync from SNC first.</div>
                <button className="btn btn-primary btn-sm" onClick={async()=>{
                  const agentUrl = conn.agentUrl || window.AGENT_URL || "";
                  setAssignLoading(true);
                  await fetch(`${agentUrl}/sync/customers`,{method:"POST"});
                  setTimeout(()=>fetchCustomersAndBranches(), 4000);
                }}>↻ Sync Customers from SNC</button>
              </div>
            )}
            {customers.length > 0 && <div style={{fontSize:11,color:"var(--accent)",marginBottom:8}}>✓ {customers.length} customers loaded</div>}

            {/* Individual chat assignment */}
            {!String(assignChat.id).endsWith("@g.us") && (
              <div>
                <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:1,color:"var(--text2)",fontWeight:700,marginBottom:10}}>Assign to Customer</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                  <div>
                    <label style={{fontSize:11,color:"var(--text2)",display:"block",marginBottom:4}}>CUSTOMER</label>
                    <select className="form-input" value={(assignments[assignChat.id] && assignments[assignChat.id].store_id)||""}
                      onChange={e=>{
                        const c = (customers||[]).find(x=>x.store_id===e.target.value);
                        if(c) {
                          saveAssignment(assignChat.id,null,"customer",c.label,{store_id:c.store_id,customer_id:c.id,branch_id:c.branch_id,branch:c.branch,branches:c.branches});
                        }
                      }}>
                      <option value="">— Select Customer —</option>
                      {(customers||[]).map(c=><option key={c.id} value={c.store_id}>{c.label}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:11,color:"var(--text2)",display:"block",marginBottom:4}}>BRANCH</label>
                    <select className="form-input" value={(assignments[assignChat.id] && assignments[assignChat.id].branch_id)||""}
                      onChange={e=>{
                        const branches = (assignments[assignChat.id] && assignments[assignChat.id].branches)||[];
                        const b = branches.find(x=>x.branch_id===e.target.value);
                        if(b) saveAssignment(assignChat.id,null,"branch",b.branch_name,{branch_id:b.branch_id});
                      }}>
                      <option value="">— Select Branch —</option>
                      {((assignments[assignChat.id] && assignments[assignChat.id].branches)||[]).map(b=><option key={b.branch_id} value={b.branch_id}>{b.branch_name}</option>)}
                    </select>
                  </div>
                </div>
              </div>
            )}

            {/* Group chat — assign per member */}
            {String(assignChat.id).endsWith("@g.us") && (
              <div>
                <div style={{fontSize:11,textTransform:"uppercase",letterSpacing:1,color:"var(--text2)",fontWeight:700,marginBottom:10}}>
                  Assign Customers to Members
                </div>
                {(groupMembers[assignChat.id]||[]).length === 0 && (
                  <div style={{color:"var(--text2)",fontSize:12,padding:"20px",textAlign:"center",border:"1px dashed var(--border)",borderRadius:"var(--r2)"}}>
                    <div style={{marginBottom:8}}>⏳ Loading group members from Whapi...</div>
                    <div style={{fontSize:11}}>If this stays empty, Whapi may not support group member lookup for your plan.</div>
                    <div style={{marginTop:12,fontSize:11,color:"var(--accent)"}}>
                      You can assign this group chat as a whole to a customer instead:
                    </div>
                    <div style={{display:"flex",gap:8,marginTop:8,justifyContent:"center"}}>
                      <select className="form-input" style={{width:200,fontSize:11}} onChange={e=>{
                        const c=(customers||[]).find(x=>x.store_id===e.target.value);
                        if(c) saveAssignment(assignChat.id,null,"customer",c.label,{store_id:c.store_id,branch_id:c.branch_id,branch:c.branch});
                      }}>
                        <option value="">— Assign whole group —</option>
                        {(customers||[]).map(c=><option key={c.id} value={c.store_id}>{c.label}</option>)}
                      </select>
                    </div>
                  </div>
                )}
                {(groupMembers[assignChat.id]||[]).map((m,i)=>(
                  <div key={m.id} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,padding:"10px 0",borderBottom:"1px solid var(--border)",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div className={`wa-avatar ${getAV(i)}`} style={{width:28,height:28,fontSize:10,borderRadius:"50%"}}>{(m.name||"?")[0]}</div>
                      <div>
                        <div style={{fontWeight:600,fontSize:12}}>{m.name}</div>
                        <div style={{fontSize:10,color:"var(--text2)"}}>{m.phone}</div>
                      </div>
                    </div>
                    <select className="form-input" style={{fontSize:11,padding:"5px 8px"}} value={(assignments[m.id] && assignments[m.id].store_id)||""}
                      onChange={e=>{
                        const c=(customers||[]).find(x=>x.store_id===e.target.value);
                        if(c) saveAssignment(null,m.id,"customer",c.label,{store_id:c.store_id,branches:c.branches});
                      }}>
                      <option value="">— Customer —</option>
                      {(customers||[]).map(c=><option key={c.id} value={c.store_id}>{c.label}</option>)}
                    </select>
                    <select className="form-input" style={{fontSize:11,padding:"5px 8px"}} value={assignments[m.id] && assignments[m.id].branch_id||""}
                      onChange={e=>{
                        const branches=(assignments[m.id] && assignments[m.id].branches)||[];
                        const b=branches.find(x=>x.branch_id===e.target.value);
                        if(b) saveAssignment(null,m.id,"branch",b.branch_name,{branch_id:b.branch_id});
                      }}>
                      <option value="">— Branch —</option>
                      {((assignments[m.id] && assignments[m.id].branches)||[]).map(b=><option key={b.branch_id} value={b.branch_id}>{b.branch_name}</option>)}
                    </select>
                  </div>
                ))}
              </div>
            )}

            <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}>
              <button className="btn btn-ghost" onClick={()=>setShowAssign(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={confirmAssignment}>✓ Save Assignment</button>
            </div>
          </div>
        </div>
      )}

      {/* Connection banner */}
      {!wapiOk && (
        <div style={{padding:"10px 20px",background:"#f59e0b15",borderBottom:"1px solid #f59e0b30",display:"flex",alignItems:"center",gap:10,fontSize:12,color:"var(--warn)",flexShrink:0}}>
          <span>⚠️</span>
          <span>WhatsApp not connected — showing demo data. </span>
          <span style={{color:"var(--text2)"}}>Go to</span>
          <strong style={{color:"var(--warn)"}}>WA Settings</strong>
          <span style={{color:"var(--text2)"}}>to connect your Whapi channel.</span>
        </div>
      )}
      {wapiOk && (
        <div style={{padding:"8px 20px",background:"#00d9a310",borderBottom:"1px solid #00d9a330",display:"flex",alignItems:"center",gap:8,fontSize:12,color:"var(--accent)",flexShrink:0}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:"var(--accent)",display:"inline-block"}}/>
          <span>Connected · Channel <strong>{wapiChannelId}</strong>{wapiPhoneNumber && <> · +{wapiPhoneNumber}</>} · {totalUnread} unread</span>
          <span style={{marginLeft:"auto",color:"var(--text2)"}}>
            {loading
              ? "Syncing…"
              : fetchErr
                ? <span style={{color:"#f59e0b",cursor:"help"}} title={fetchErr}>⚠ {fetchErr}</span>
                : lastFetch
                  ? `Synced ${lastFetch.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}`
                  : "Ready"}
          </span>
        </div>
      )}
      {wapiOk && fetchErr && (
        <div style={{padding:"12px 20px",background:"#f59e0b08",borderBottom:"1px solid #f59e0b20",fontSize:12,flexShrink:0}}>
          <div style={{fontWeight:700,color:"#f59e0b",marginBottom:6}}>⚠ Cannot load messages — choose a fix:</div>
          <div style={{display:"flex",gap:24,flexWrap:"wrap"}}>
            <div>
              <div style={{fontWeight:600,color:"var(--text)",marginBottom:3}}>Option A · Add proxy to your agent (recommended)</div>
              <code style={{fontSize:11,color:"var(--text2)",fontFamily:"monospace",display:"block"}}>
                # Copy whapi_proxy_routes.py to your agent folder, then in main.py:<br/>
                from whapi_proxy_routes import router as whapi_router<br/>
                app.include_router(whapi_router)<br/>
                # Also add CORSMiddleware with allow_origins=["*"]
              </code>
            </div>
            <div>
              <div style={{fontWeight:600,color:"var(--text)",marginBottom:3}}>Option B · Check agent is running</div>
              <code style={{fontSize:11,color:"var(--text2)",fontFamily:"monospace",display:"block"}}>
                curl {conn.agentUrl || "http://158.140.133.82:8000"}/health<br/>
                # Should return 200. If not, start the agent first.
              </code>
            </div>
          </div>
        </div>
      )}
      <div className="wa-layout" style={{flex:1,overflow:"hidden"}}>
        <div className="wa-sidebar">
          <div style={{padding:"10px 14px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontSize:11,fontWeight:700,color:"var(--text2)",textTransform:"uppercase",letterSpacing:1}}>
              {loading ? "Syncing…" : `${filteredChats.length} chat${filteredChats.length!==1?"s":""}`}
            </span>
            {wapiOk && <button className="btn btn-ghost" style={{fontSize:11,padding:"3px 8px"}} onClick={fetchChats} title="Refresh">↻ Refresh</button>}
          </div>
          <div className="wa-search">
            <input placeholder="Search conversations..." value={searchQ} onChange={e=>setSearchQ(e.target.value)} style={{width:"100%",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:20,padding:"8px 14px",color:"var(--text)",fontSize:13,outline:"none"}}/>
          </div>
          <div className="wa-list">{filteredChats.map((c,i)=>(
            <div key={c.id} className={`wa-chat-item${String(active && active.id)===String(c.id)?" active":""}`} onClick={()=>setActive(c)}>
              <div className={`wa-avatar ${getAV(i)}`} style={{position:"relative"}}>{c.avatar}{c.online&&<div className="wa-online-dot"/>}</div>
              <div className="wa-chat-info">
                <div className="wa-chat-name">{c.name}</div>
                <div className="wa-chat-preview">{c.lastMsg}</div>
              </div>
              <div className="wa-chat-meta">
                <div className="wa-time">{c.time}</div>
                {c.unread>0&&<div className="wa-unread">{c.unread}</div>}
              </div>
            </div>
          ))}</div>
        </div>

        {cur ? (
          <div className="wa-window">
            <div className="wa-header">
              <div className={`wa-avatar ${getAV(chats.findIndex(c=>c.id===cur.id))}`} style={{width:36,height:36,fontSize:12}}>{cur.avatar}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{fontWeight:700,fontSize:14}}>{cur.name}</div>
                  {String(cur.id).endsWith("@g.us") && <span style={{fontSize:10,background:"#7c4dff22",color:"#a78bfa",padding:"2px 6px",borderRadius:10,fontWeight:700}}>GROUP</span>}
                  {assignments[cur.id] && assignments[cur.id].customer && (
                    <span style={{fontSize:10,background:"#00d9a320",color:"var(--accent)",padding:"2px 6px",borderRadius:10}}>
                      👤 {assignments[cur.id].customer}
                    </span>
                  )}
                </div>
                <div style={{fontSize:11,color:"var(--text2)",marginTop:2}}>
                  {String(cur.id).endsWith("@g.us")
                    ? `${(groupMembers[cur.id]||[]).length || "?"} members`
                    : (cur.online ? "● Online" : "Last seen recently")}
                  {assignments[cur.id] && assignments[cur.id].branch && <span style={{marginLeft:8,color:"#60a5fa"}}>📍 {assignments[cur.id].branch}</span>}
                </div>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={()=>fetchMessages(cur.id)} title="Refresh">↻</button>
              <button className="btn btn-ghost btn-sm" style={{background:"#f59e0b15",color:"var(--warn)",border:"1px solid #f59e0b30"}}
                onClick={()=>openAssignModal(cur)}>
                + Assign Customer
              </button>
              <button className="btn btn-primary btn-sm" onClick={()=>{
                const a = assignments[cur.id];
                if (!a || !a.store_id) {
                  alert("Please assign a customer to this chat first using the '+ Assign Customer' button");
                  return;
                }
                setCreateOrderChat(cur);
                setShowCreateOrder(true);
              }}>🛒 Create Order</button>
            </div>

            {/* Group members strip */}
            {String(cur.id).endsWith("@g.us") && (groupMembers[cur.id] && groupMembers[cur.id].length) > 0 && (
              <div style={{padding:"8px 16px",background:"#7c4dff0a",borderBottom:"1px solid var(--border)",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:10,color:"#a78bfa",fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Members:</span>
                {groupMembers[cur.id].map((m,i) => (
                  <div key={m.id} style={{display:"flex",alignItems:"center",gap:4,background:"var(--bg2)",borderRadius:20,padding:"3px 10px",fontSize:11,border:"1px solid var(--border)"}}>
                    <div className={`wa-avatar ${getAV(i)}`} style={{width:18,height:18,fontSize:8,borderRadius:"50%",flexShrink:0}}>{(m.name||"?")[0]}</div>
                    <span style={{fontWeight:600}}>{m.name}</span>
                    {m.role==="creator"&&<span style={{color:"#f59e0b",fontSize:9}}>★</span>}
                    {assignments[m.id] && assignments[m.id].customer && <span style={{color:"var(--accent)",fontSize:9}}>✓ {assignments[m.id].customer}</span>}
                  </div>
                ))}
              </div>
            )}

            <div className="wa-messages">
              {cur.messages.map(m=>(
                <div key={m.id} className={`wa-msg-row ${m.from}`}>
                  <div className={`wa-bubble ${m.from}`}>
                    <div>{m.text}</div>
                    {m.intent&&<IntentTag intent={m.intent}/>}
                    <div className="wa-bubble-time">{m.time}</div>
                  </div>
                </div>
              ))}
            </div>

            <div className="wa-input-bar">
              <button className="btn btn-ghost" style={{padding:"8px 12px"}}>📎</button>
              <input className="wa-input" placeholder="Type a message..." value={inp}
                onChange={e=>setInp(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&send()}/>
              <button className="btn btn-primary" onClick={send} disabled={sending}>{sending?"Sending…":"Send"}</button>
            </div>
            <div ref={msgEndRef}/>
          </div>
        ) : (
          <div className="wa-empty">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <div style={{fontWeight:600}}>No conversations found</div>
            <div style={{fontSize:13}}>AI detects order intents automatically</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── FIELD + SECTION HELPERS ─────────────────────────────────────────────────
function Field({ label, hint, children }) {
  return (
    <div className="form-group">
      <label className="form-label">{label}</label>
      {children}
      {hint && <div style={{ fontSize: 11, color: "var(--text2)", marginTop: 4 }}>{hint}</div>}
    </div>
  );
}
function SectionDivider({ label }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "18px 0 14px" }}>
      <div style={{ height: 1, flex: 1, background: "var(--border)" }} />
      <span style={{ fontSize: 10, letterSpacing: 2, textTransform: "uppercase", color: "var(--text2)", fontWeight: 700 }}>{label}</span>
      <div style={{ height: 1, flex: 1, background: "var(--border)" }} />
    </div>
  );
}
function StatusBadge({ ok, testing, error }) {
  if (testing) return <span style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 12, color: "var(--warn)" }}><span style={{ width: 8, height: 8, borderRadius: "50%", background: "var(--warn)", display: "inline-block" }} />Testing…</span>;
  if (error)   return <span style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 12, color: "var(--danger)" }}><span style={{ width: 8, height: 8, borderRadius: "50%", background: "var(--danger)", display: "inline-block" }} />{error}</span>;
  if (ok)      return <span style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 12, color: "var(--accent)", fontWeight: 600 }}><span style={{ width: 8, height: 8, borderRadius: "50%", background: "var(--accent)", display: "inline-block" }} />Connected</span>;
  return       <span style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 12, color: "var(--text2)" }}><span style={{ width: 8, height: 8, borderRadius: "50%", background: "var(--text2)", display: "inline-block" }} />Not Connected</span>;
}
function InfoBox({ color = "#60a5fa", icon, children }) {
  return <div style={{ padding: "10px 14px", background: color + "12", border: `1px solid ${color}30`, borderRadius: "var(--r2)", fontSize: 12, color, lineHeight: 1.7, marginTop: 12 }}>{icon && <span style={{ marginRight: 6 }}>{icon}</span>}{children}</div>;
}

// ─── CONNECT SCREEN ───────────────────────────────────────────────────────────
function ConnectScreen({ defaultTab = "erp", conn, setConn }) {
  const [tab, setTab] = useState(defaultTab);

  // ── ERP local UI state (non-sensitive, stays local) ──
  const [erpShowPw,    setErpShowPw]    = useState(false);
  const [erpTesting,   setErpTesting]   = useState(false);
  const [erpError,     setErpError]     = useState("");

  // Lifted state via conn prop
  const erpApiUrl    = conn.erpApiUrl;    const setErpApiUrl    = v => setConn(c=>({...c, erpApiUrl:v}));
  const erpUsername  = conn.erpUsername;  const setErpUsername  = v => setConn(c=>({...c, erpUsername:v}));
  const erpPassword  = conn.erpPassword;  const setErpPassword  = v => setConn(c=>({...c, erpPassword:v}));
  const erpCompanyId = conn.erpCompanyId; const setErpCompanyId = v => setConn(c=>({...c, erpCompanyId:v}));
  const erpTimezone  = conn.erpTimezone;  const setErpTimezone  = v => setConn(c=>({...c, erpTimezone:v}));
  const erpToken     = conn.erpToken;     const setErpToken     = v => setConn(c=>({...c, erpToken:v}));
  const erpUserId    = conn.erpUserId;    const setErpUserId    = v => setConn(c=>({...c, erpUserId:v}));
  const erpOk        = conn.erpOk;        const setErpOk        = v => setConn(c=>({...c, erpOk:v}));
  const erpLastSync  = conn.erpLastSync;  const setErpLastSync  = v => setConn(c=>({...c, erpLastSync:v}));
  const wapiUrl      = conn.wapiUrl;      const setWapiUrl      = v => setConn(c=>({...c, wapiUrl:v}));
  const wapiToken    = conn.wapiToken;    const setWapiToken    = v => setConn(c=>({...c, wapiToken:v}));
  const wapiChannelId   = conn.wapiChannelId;   const setWapiChannelId   = v => setConn(c=>({...c, wapiChannelId:v}));
  const wapiPhoneNumber = conn.wapiPhoneNumber; const setWapiPhoneNumber = v => setConn(c=>({...c, wapiPhoneNumber:v}));
  const wapiOk       = conn.wapiOk;       const setWapiOk       = v => setConn(c=>({...c, wapiOk:v}));
  const agentUrl     = conn.agentUrl;     const setAgentUrl     = v => setConn(c=>({...c, agentUrl:v}));
  const webhookSecret= conn.webhookSecret;const setWebhookSecret= v => setConn(c=>({...c, webhookSecret:v}));

  const [wapiShowToken, setWapiShowToken] = useState(false);
  const [wapiTesting,   setWapiTesting]   = useState(false);
  const [wapiError,     setWapiError]     = useState("");


  const testErpConnection = async () => {
    if (!erpApiUrl || !erpUsername || !erpPassword) {
      setErpError("Please fill in all required fields."); return;
    }
    setErpTesting(true); setErpError(""); setErpOk(false);
    try {
      const fd = new FormData();
      fd.append("username", erpUsername);
      fd.append("password", erpPassword);
      fd.append("grant_type", "password");
      fd.append("notification", "false");
      // Clean URL — strip trailing slash, ensure /api is present
      const cleanUrl = erpApiUrl.replace(/\/+$/, '');
      const loginUrl = cleanUrl.endsWith('/api') ? `${cleanUrl}/login`
                     : cleanUrl.includes('/api/') ? `${cleanUrl.split('/api/')[0]}/api/login`
                     : `${cleanUrl}/api/login`;
      console.log('Attempting login at:', loginUrl);

      let data = null;
      const _agUrl = (conn.agentUrl || window.AGENT_URL || "").replace(/\/+$/, "");

      // SNC encrypts credentials on their frontend using Fernet encryption.
      // We must send the already-encrypted values from the Postman collection,
      // OR send plain text and let backend handle it.
      // The erpUsername/erpPassword fields accept EITHER plain text OR pre-encrypted Fernet tokens.
      if (_agUrl) {
        console.log("Logging in via backend proxy:", _agUrl);
        try {
          const proxyRes = await fetch(`${_agUrl}/proxy/snc/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              api_url:  loginUrl,
              username: erpUsername,
              password: erpPassword,
              raw_mode: true   // tell backend to pass credentials as-is
            })
          });
          const proxyData = await proxyRes.json();
          if (!proxyRes.ok) throw new Error(proxyData.detail || `HTTP ${proxyRes.status}`);
          data = proxyData;
          console.log("Proxy login success:", data.access_token ? "got token" : "no token");
        } catch(proxyErr) {
          throw new Error(`Login failed: ${proxyErr.message}`);
        }
      } else {
        console.warn("No backend URL set — trying direct");
        try {
          const res = await fetch(loginUrl, { method: "POST", body: fd });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          data = await res.json();
        } catch(e) {
          throw new Error(`Login failed: ${e.message}. Set your Railway backend URL in the bottom-right corner first!`);
        }
      }

      if (data && data.access_token) {
        const ts = new Date().toLocaleString();
        setConn(c => ({ ...c, erpToken: data.access_token, erpUserId: data.user_id || "", erpOk: true, erpLastSync: ts }));
        // Sync credentials to backend agent
        const _agUrl = conn.agentUrl || window.AGENT_URL || "";
        try { await fetch(_agUrl+"/credentials",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({snc:{api_url:erpApiUrl,access_token:data.access_token,user_id:data.user_id||"",username:erpUsername,company_id:erpCompanyId,timezone:erpTimezone}})}); } catch(_){}
      } else {
        throw new Error((data && data.detail) || "Login failed — check your username and password");
      }
    } catch (e) {
      setErpError(e.message || "Connection failed");
    } finally {
      setErpTesting(false);
    }
  };

  // ── Webhook URLs (constants) ──
  const erpWebhookUrl  = "https://oneaether.ai/webhook/snc";
  const wapiWebhookUrl = "https://oneaether.ai/webhook/whatsapp";

  const testWapiConnection = async () => {
    if (!wapiToken || !wapiChannelId) {
      setWapiError("Token and Channel ID are required."); return;
    }
    setWapiTesting(true); setWapiError("");
    let statusOk = false;
    try {
      // Try Whapi channel status endpoint
      const res = await fetch(`${wapiUrl}/channels/${wapiChannelId}`, {
        headers: { Authorization: `Bearer ${wapiToken}`, Accept: "application/json" }
      });
      if (res.ok) {
        const data = await res.json();
        // status field: "authenticated" | "connected" means live
        const status = ((data && data.status) || "").toLowerCase();
        statusOk = ["authenticated","connected","active"].some(s => status.includes(s)) || res.ok;
      } else if (res.status === 401) {
        setWapiError("Invalid token — please check your Whapi bearer token."); 
      } else {
        statusOk = true; // other errors may be network/CORS — assume OK
      }
    } catch(_) {
      statusOk = true; // CORS/network blocked — assume creds are correct, mark connected
    }
    if (statusOk) {
      setConn(c => ({ ...c, wapiOk: true, wapiUrl, wapiToken, wapiChannelId, wapiPhoneNumber, agentUrl, webhookSecret }));
    }
    setWapiTesting(false);
  };

  const copyToClipboard = (text) => {
    navigator.clipboard && navigator.clipboard.writeText(text).catch(() => {});
  };

  const TIMEZONES = [
    "Asia/Kuala_Lumpur","Asia/Singapore","Asia/Calcutta","Asia/Kolkata",
    "Asia/Jakarta","Asia/Bangkok","Asia/Manila","UTC","America/New_York","Europe/London",
  ];

  return (
    <div style={{ display: "flex", height: "calc(100vh - 52px)", overflow: "hidden" }}>
      {/* Left: tabs + forms */}
      <div style={{ flex: 1, overflow: "auto", padding: "24px" }}>
        <div className="tabs mb-4">
          {[
            { key: "erp",    label: "⚡ SellnChill ERP" },
            { key: "whapi",  label: "💬 WhatsApp" },
            { key: "upload", label: "📤 Manual Upload" },
          ].map(t => (
            <div key={t.key} className={`tab ${tab === t.key ? "active" : ""}`} onClick={() => setTab(t.key)}>{t.label}</div>
          ))}
        </div>

        {/* ── ERP TAB ── */}
        {tab === "erp" && (
          <div style={{ maxWidth: 600 }}>
            <div className="card">
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 18 }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                    <div className="connect-icon" style={{ background: "#7c4dff20", width: 40, height: 40, marginBottom: 0, fontSize: 18 }}>⚡</div>
                    <div>
                      <div className="connect-title" style={{ marginBottom: 2 }}>SellnChill ERP</div>
                      <div style={{ fontSize: 12, color: "var(--text2)" }}>sellnchill.com · delivernchill.com</div>
                    </div>
                  </div>
                </div>
                <StatusBadge ok={erpOk} testing={erpTesting} error={erpError} />
              </div>

              <SectionDivider label="Server" />

              <Field label="API Base URL *" hint="e.g. http://158.140.133.83:5000 or https://dev2.snc.delivernchill.com/api">
                <input className="form-input" value={erpApiUrl} onChange={e => setErpApiUrl(e.target.value.trim())} placeholder="http://158.140.133.83:5000" />
              </Field>

              <SectionDivider label="Authentication" />

              <Field label="Username / Email *" hint="Your SellnChill login email">
                <input className="form-input" type="email" value={erpUsername} onChange={e => setErpUsername(e.target.value)} placeholder="admin@yourcompany.com" autoComplete="username" />
              </Field>

              <Field label="Password *">
                <div style={{ position: "relative" }}>
                  <input className="form-input" type={erpShowPw ? "text" : "password"} value={erpPassword} onChange={e => setErpPassword(e.target.value)} placeholder="Your SellnChill password" autoComplete="current-password" style={{ paddingRight: 40 }} />
                  <button onClick={() => setErpShowPw(v => !v)} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "var(--text2)", cursor: "pointer", fontSize: 14 }}>
                    {erpShowPw ? "🙈" : "👁"}
                  </button>
                </div>
              </Field>

              <SectionDivider label="Company Details" />

              <Field label="Company ID *" hint="Your SellnChill company slug, e.g. mindmasters">
                <input className="form-input" value={erpCompanyId} onChange={e => setErpCompanyId(e.target.value.trim())} placeholder="e.g. mindmasters" />
              </Field>

              <Field label="Timezone" hint="Used in all API requests">
                <select className="form-input" value={erpTimezone} onChange={e => setErpTimezone(e.target.value)}>
                  {TIMEZONES.map(tz => <option key={tz} value={tz}>{tz}</option>)}
                </select>
              </Field>

              {erpOk && (
                <>
                  <SectionDivider label="Retrieved from Login" />
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    <Field label="Access Token">
                      <div style={{ position: "relative" }}>
                        <input className="form-input" value={erpToken} readOnly style={{ paddingRight: 60, fontFamily: "monospace", fontSize: 10, opacity: 0.7 }} />
                        <button onClick={() => copyToClipboard(erpToken)} style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "var(--accent)", cursor: "pointer", fontSize: 11, fontWeight: 700 }}>COPY</button>
                      </div>
                    </Field>
                    <Field label="User ID">
                      <input className="form-input" value={erpUserId || "(returned on login)"} readOnly style={{ fontFamily: "monospace", fontSize: 11, opacity: 0.7 }} />
                    </Field>
                  </div>
                </>
              )}

              {erpError && <InfoBox color="#ff4d6d" icon="⚠️">{erpError}</InfoBox>}

              <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
                <button className="btn btn-primary" style={{ flex: 1, justifyContent: "center" }}
                  onClick={testErpConnection} disabled={erpTesting || !erpApiUrl || !erpUsername || !erpPassword}>
                  {erpTesting ? "Testing connection…" : erpOk ? "✓ Connected — Re-authenticate" : "Test & Connect"}
                </button>
                {erpOk && (
                  <button className="btn btn-ghost" onClick={() => setConn(c=>({...c, erpOk:false, erpToken:"", erpUserId:""}))}>Disconnect</button>
                )}
              </div>

              {/* Direct token paste — bypass login if SNC encrypts credentials */}
              <div style={{marginTop:16,padding:"14px",background:"#f59e0b10",border:"1px solid #f59e0b30",borderRadius:"var(--r2)"}}>
                <div style={{fontSize:11,color:"var(--warn)",fontWeight:700,marginBottom:8}}>⚡ SHORTCUT — Paste Bearer Token directly</div>
                <div style={{fontSize:11,color:"var(--text2)",marginBottom:8}}>
                  If login keeps failing, get your token from SellnChill → Settings → API, or from your Postman collection (Authorization variable). Paste it below:
                </div>
                <div style={{display:"flex",gap:8}}>
                  <input className="form-input" style={{flex:1,fontFamily:"monospace",fontSize:11}}
                    placeholder="Paste Bearer token here (eyJ... or similar)"
                    value={erpToken}
                    onChange={e=>setErpToken(e.target.value.trim())}/>
                  <button className="btn btn-primary btn-sm" disabled={!erpToken||!erpCompanyId}
                    onClick={()=>{
                      setErpOk(true);
                      setErpLastSync(new Date().toLocaleString());
                      const _ag = conn.agentUrl || window.AGENT_URL || "";
                      if(_ag) fetch(_ag+"/credentials",{method:"POST",headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({snc:{api_url:erpApiUrl,access_token:erpToken,company_id:erpCompanyId,username:erpUsername,timezone:erpTimezone}})}).catch(()=>{});
                    }}>
                    ✓ Use Token
                  </button>
                </div>
              </div>

              {erpOk && (
                <InfoBox color="#00d9a3" icon="✓">
                  Connected to <strong>{erpCompanyId}</strong>. Bearer token stored for API calls.
                  {erpLastSync && <> Last authenticated: {erpLastSync}.</>} Customers, orders and products will now sync automatically.
                </InfoBox>
              )}

              <SectionDivider label="API Endpoints (read-only reference)" />
              <div style={{ background: "var(--bg3)", borderRadius: "var(--r2)", padding: "12px 14px", fontSize: 11, fontFamily: "monospace", lineHeight: 2, color: "var(--text2)" }}>
                {[
                  ["POST", "/login",              "Authenticate → get access_token"],
                  ["GET",  "/job/{jobId}",         "Poll async job result"],
                  ["POST", "/customers/get",       "Fetch customer list / detail"],
                  ["POST", "/products/list",       "Fetch product catalogue"],
                  ["POST", "/b2b/orders/get",      "Fetch B2B orders"],
                  ["POST", "/b2b/order/save",      "Create or modify order"],
                  ["POST", "/whatsapp/messages/send","Send WhatsApp message"],
                  ["POST", "/whatsapp/contacts/get","Get WhatsApp contacts"],
                ].map(([method, path, desc]) => (
                  <div key={path} style={{ display: "flex", gap: 8 }}>
                    <span style={{ color: method === "POST" ? "#f59e0b" : "#60a5fa", minWidth: 36 }}>{method}</span>
                    <span style={{ color: "var(--text)", minWidth: 230 }}>{path}</span>
                    <span style={{ color: "var(--text2)" }}>— {desc}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── WHAPI TAB ── */}
        {tab === "whapi" && (
          <div style={{ maxWidth: 600 }}>
            <div className="card">
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 18 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div className="connect-icon" style={{ background: "#25d36620", width: 40, height: 40, marginBottom: 0, fontSize: 18 }}>💬</div>
                  <div>
                    <div className="connect-title" style={{ marginBottom: 2 }}>WhatsApp via Whapi.cloud</div>
                    <div style={{ fontSize: 12, color: "var(--text2)" }}>whapi.cloud API</div>
                  </div>
                </div>
                <StatusBadge ok={wapiOk} testing={wapiTesting} error={wapiError} />
              </div>

              <SectionDivider label="Whapi Credentials" />

              <Field label="Whapi API Base URL">
                <input className="form-input" value={wapiUrl} onChange={e => setWapiUrl(e.target.value.trim())} placeholder="https://gate.whapi.cloud" />
              </Field>

              <Field label="Bearer Token *" hint="From your Whapi.cloud dashboard → Channels → Token">
                <div style={{ position: "relative" }}>
                  <input className="form-input" type={wapiShowToken ? "text" : "password"} value={wapiToken} onChange={e => setWapiToken(e.target.value.trim())} placeholder="eyJ..." style={{ paddingRight: 80 }} />
                  <div style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", display: "flex", gap: 6 }}>
                    <button onClick={() => setWapiShowToken(v => !v)} style={{ background: "none", border: "none", color: "var(--text2)", cursor: "pointer", fontSize: 13 }}>{wapiShowToken ? "🙈" : "👁"}</button>
                    {wapiToken && <button onClick={() => copyToClipboard(wapiToken)} style={{ background: "none", border: "none", color: "var(--accent)", cursor: "pointer", fontSize: 10, fontWeight: 700 }}>COPY</button>}
                  </div>
                </div>
              </Field>

              <Field label="Channel ID *" hint="Your Whapi channel / instance ID, e.g. SHAZAM-HGS85">
                <input className="form-input" value={wapiChannelId} onChange={e => setWapiChannelId(e.target.value.trim())} placeholder="e.g. SHAZAM-HGS85" />
              </Field>

              <Field label="WhatsApp Phone Number" hint="Your linked WhatsApp number in international format, e.g. 60123456789">
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 13, color: "var(--text2)", padding: "0 4px" }}>+</span>
                  <input className="form-input" value={wapiPhoneNumber} onChange={e => setWapiPhoneNumber(e.target.value.replace(/\D/g,""))} placeholder="60123456789 (no + or spaces)" style={{ flex: 1 }} />
                </div>
              </Field>

              <SectionDivider label="Webhook Settings" />

              <Field label="Incoming Message Webhook URL" hint="Set this URL in your Whapi.cloud channel webhook settings">
                <div style={{ position: "relative" }}>
                  <input className="form-input" value={wapiWebhookUrl} readOnly style={{ paddingRight: 60, fontFamily: "monospace", fontSize: 11, opacity: 0.8 }} />
                  <button onClick={() => copyToClipboard(wapiWebhookUrl)} style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "var(--accent)", cursor: "pointer", fontSize: 10, fontWeight: 700 }}>COPY</button>
                </div>
              </Field>

              <Field label="Webhook Secret (optional)" hint="Used to validate incoming webhook payloads">
                <input className="form-input" type="password" value={webhookSecret} onChange={e => setWebhookSecret(e.target.value)} placeholder="Optional HMAC secret..." />
              </Field>

              <SectionDivider label="AI Agent Settings" />

              <Field label="Agent Webhook URL" hint="Your AI agent endpoint that processes incoming WhatsApp messages">
                <input className="form-input" value={agentUrl} onChange={e => setAgentUrl(e.target.value.trim())} placeholder="http://158.140.133.82:8000" />
              </Field>

              <div style={{ padding: "10px 14px", background: "var(--bg3)", borderRadius: "var(--r2)", fontSize: 11, fontFamily: "monospace", lineHeight: 1.9, color: "var(--text2)", marginTop: 4 }}>
                <div style={{ color: "var(--text)", fontWeight: 600, fontFamily: "var(--fb)", fontSize: 12, marginBottom: 6 }}>Message flow:</div>
                <div>WhatsApp message → Whapi.cloud → <span style={{ color: "var(--accent)" }}>{wapiWebhookUrl}</span></div>
                <div>→ oneaether.ai processes intent → <span style={{ color: "#f59e0b" }}>{agentUrl}/process-message</span></div>
                <div>→ Creates order in SellnChill ERP via <span style={{ color: "#60a5fa" }}>{erpApiUrl || "SellnChill API"}</span></div>
              </div>

              {wapiError && <InfoBox color="#ff4d6d" icon="⚠️">{wapiError}</InfoBox>}

              <div style={{ display: "flex", gap: 10, marginTop: 20, flexWrap: "wrap" }}>
                <button className="btn btn-primary" style={{ flex: 1, justifyContent: "center", minWidth: 140 }}
                  onClick={() => {
                    if (!wapiToken || !wapiChannelId) { setWapiError("Token and Channel ID are required."); return; }
                    setConn(c => ({ ...c, wapiOk: true, wapiUrl, wapiToken, wapiChannelId, wapiPhoneNumber, agentUrl, webhookSecret }));
                    setWapiError("");
                  }}
                  disabled={!wapiToken || !wapiChannelId}>
                  {wapiOk ? "✓ Update Settings" : "💾 Save & Connect"}
                </button>
                <button className="btn btn-ghost" style={{ justifyContent: "center", minWidth: 120 }}
                  onClick={testWapiConnection} disabled={wapiTesting || !wapiToken || !wapiChannelId}
                  title="Sends a test request to Whapi to verify your token">
                  {wapiTesting ? "Testing…" : "🔍 Test API"}
                </button>
                {wapiOk && <button className="btn btn-ghost" style={{color:"var(--danger)"}} onClick={() => setConn(c=>({...c, wapiOk:false}))}>Disconnect</button>}
              </div>
              <div style={{fontSize:11,color:"var(--text2)",marginTop:8,lineHeight:1.6}}>
                💡 <strong>Note:</strong> Browser security (CORS) may block direct API tests. Use <em>Save & Connect</em> to save your credentials — messages will load via your backend agent at <code>{agentUrl}</code>.
              </div>

              {wapiOk && (
                <InfoBox color="#25d366" icon="✓">
                  WhatsApp channel <strong>{wapiChannelId}</strong> saved &amp; connected. Go to <strong>WhatsApp Inbox</strong> to see messages — they load automatically from Whapi.cloud.
                </InfoBox>
              )}

              <SectionDivider label="Send Message API reference" />
              <div style={{ background: "var(--bg3)", borderRadius: "var(--r2)", padding: "12px 14px", fontSize: 11, lineHeight: 1.7 }}>
                <div style={{ fontFamily: "monospace", color: "var(--text2)" }}>POST {wapiUrl || "https://gate.whapi.cloud"}/messages/send</div>
                <div style={{ marginTop: 8, fontFamily: "monospace", fontSize: 10, color: "var(--text2)", whiteSpace: "pre-wrap" }}>{`Authorization: Bearer <token>
{
  "company_id": "${erpCompanyId || "<company_id>"}",
  "data": {
    "contact_id": "<chat_id>",
    "type": "text",          // or "image"
    "body": "Your message"
  }
}`}</div>
              </div>
            </div>
          </div>
        )}

        {/* ── UPLOAD TAB ── */}
        {tab === "upload" && (
          <div style={{ maxWidth: 600 }}>
            <div className="card">
              <div style={{ marginBottom: 18 }}>
                <div className="connect-title">Manual Data Upload</div>
                <div className="connect-desc">Import data directly by uploading CSV files. Use this if you don't have direct ERP access.</div>
              </div>
              {[
                { label: "Customer Data",     desc: "Required columns: name, phone, email, total_orders, revenue, last_order_date",     icon: "👥" },
                { label: "Order History",     desc: "Required columns: order_id, customer_id, order_date, amount, status, products",   icon: "🛒" },
                { label: "Product Catalogue", desc: "Required columns: sku, name, price, category, uom, status",                       icon: "📦" },
              ].map((u, i) => (
                <div key={i} style={{ marginBottom: 18 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                    <span style={{ fontSize: 16 }}>{u.icon}</span>
                    <div style={{ fontWeight: 600, fontSize: 13 }}>{u.label}</div>
                  </div>
                  <div style={{ fontSize: 12, color: "var(--text2)", marginBottom: 8 }}>{u.desc}</div>
                  <div className="upload-zone">
                    <div style={{ fontSize: 24, marginBottom: 6 }}>📤</div>
                    <div style={{ fontWeight: 600 }}>Drop CSV / Excel file here</div>
                    <div style={{ fontSize: 12, marginTop: 4 }}>or click to browse</div>
                  </div>
                </div>
              ))}
              <InfoBox color="#60a5fa" icon="ℹ️">
                Uploaded data will be used for CRM analytics and AI insights. For real-time order sync, connect via the SellnChill ERP tab.
              </InfoBox>
            </div>
          </div>
        )}
      </div>

      {/* Right: connection status sidebar */}
      <div style={{ width: 240, borderLeft: "1px solid var(--border)", background: "var(--bg2)", padding: "20px 16px", overflow: "auto", flexShrink: 0 }}>
        <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1.5, color: "var(--text2)", fontWeight: 700, marginBottom: 14 }}>Connection Status</div>

        {[
          { key: "erp",   label: "SellnChill ERP",   icon: "⚡", ok: erpOk,  detail: erpOk ? `${erpCompanyId} · ${erpApiUrl}` : "Not configured" },
          { key: "whapi", label: "WhatsApp (Whapi)",  icon: "💬", ok: wapiOk, detail: wapiOk ? `Channel: ${wapiChannelId}` : "Not configured" },
        ].map(c => (
          <div key={c.key} style={{ padding: "12px", background: "var(--bg3)", borderRadius: "var(--r2)", marginBottom: 10, borderLeft: `3px solid ${c.ok ? "var(--accent)" : "var(--border)"}`, cursor: "pointer" }}
            onClick={() => setTab(c.key)}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
              <span>{c.icon}</span>
              <span style={{ fontWeight: 600, fontSize: 12 }}>{c.label}</span>
              <span style={{ marginLeft: "auto", fontSize: 10, color: c.ok ? "var(--accent)" : "var(--text2)", fontWeight: 700 }}>{c.ok ? "✓ ON" : "OFF"}</span>
            </div>
            <div style={{ fontSize: 11, color: "var(--text2)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.detail}</div>
          </div>
        ))}

        {erpOk && wapiOk && (
          <InfoBox color="#00d9a3" icon="🚀">
            All systems connected! WhatsApp orders will auto-process into SellnChill ERP.
          </InfoBox>
        )}

        {!erpOk || !wapiOk ? (
          <div style={{ marginTop: 16 }}>
            <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1.5, color: "var(--text2)", fontWeight: 700, marginBottom: 10 }}>Setup Checklist</div>
            {[
              { done: !!erpApiUrl, label: "Set ERP base URL" },
              { done: erpUsername,              label: "Enter ERP credentials" },
              { done: erpCompanyId,             label: "Set company ID" },
              { done: erpOk,                    label: "Authenticate with ERP" },
              { done: wapiToken,                label: "Enter Whapi token" },
              { done: wapiChannelId,            label: "Set channel ID" },
              { done: wapiOk,                   label: "Connect WhatsApp" },
            ].map((item, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7, fontSize: 12 }}>
                <span style={{ color: item.done ? "var(--accent)" : "var(--border)", fontSize: 14 }}>{item.done ? "✓" : "○"}</span>
                <span style={{ color: item.done ? "var(--text)" : "var(--text2)" }}>{item.label}</span>
              </div>
            ))}
          </div>
        ) : null}
      </div>
    </div>
  );
}

// ─── NAV / APP ────────────────────────────────────────────────────────────────
const NAV = [
  {section:"AI CRM", items:[
    {id:"dashboard",   label:"Dashboard",      icon:"⬛"},
    {id:"ai-insights", label:"AI Insights",    icon:"✦"},
    {id:"customers",   label:"Customers",      icon:"◈"},
    {id:"segments",    label:"Segments",       icon:"◭", isNew:true},
    {id:"products",    label:"Products",       icon:"◆"},
    {id:"crm-connect", label:"Data Sources",   icon:"⊕"},
  ]},
  {section:"WhatsApp Orders", items:[
    {id:"whatsapp",    label:"WhatsApp Inbox", icon:"◉", badge:6},
    {id:"wa-connect",  label:"WA Settings",   icon:"⊙"},
  ]},
];

const TITLES = {
  "dashboard":   {title:"Dashboard",           sub:"Business overview & key metrics"},
  "ai-insights": {title:"AI Insights",          sub:"Ask anything about your business"},
  "customers":   {title:"Customers",            sub:"Customer directory & segments"},
  "segments":    {title:"Customer Segments",    sub:"Manual creation & AI-powered recommendations"},
  "products":    {title:"Products",             sub:"Product performance analytics"},
  "crm-connect": {title:"Data Sources",         sub:"Connect SellnChill ERP or upload data"},
  "whatsapp":    {title:"WhatsApp Orders",      sub:"Live inbox with AI intent detection"},
  "wa-connect":  {title:"WhatsApp Settings",    sub:"Connect via Whapi.cloud"},
};

function App() {
  const [screen, setScreen] = useState("dashboard");
  const [customers, setCustomers] = useState(INITIAL_CUSTOMERS);

  // Single flat conn object — passed as prop so ConnectScreen & WhatsAppScreen share state
  const [conn, setConn] = useState({
    erpApiUrl:    "https://enterprise.sellnchill.com/api",
    erpUsername:  "", erpPassword:  "", erpCompanyId: "",
    erpTimezone:  "Asia/Kuala_Lumpur",
    erpToken:     "", erpUserId:    "",
    erpOk:        false, erpLastSync:  null,
    wapiUrl:      "https://gate.whapi.cloud",
    wapiToken:    "", wapiChannelId: "", wapiPhoneNumber: "",
    wapiOk:       false,
    agentUrl:     "https://oneaether-agent-production.up.railway.app",
    webhookSecret:"",
  });

  const meta = TITLES[screen]||{title:screen,sub:""};

  const render = () => {
    switch(screen) {
      case "dashboard":   return <DashboardScreen conn={conn}/>;
      case "ai-insights": return <AIInsightsScreen/>;
      case "customers":   return <CustomersScreen conn={conn}/>;
      case "segments":    return <SegmentsScreen customers={customers||[]} setCustomers={setCustomers}/>;
      case "products":    return <ProductsScreen/>;
      case "crm-connect": return <ConnectScreen defaultTab="erp"   conn={conn} setConn={setConn}/>;
      case "whatsapp":    return <WhatsAppScreen conn={conn}/>;
      case "wa-connect":  return <ConnectScreen defaultTab="whapi" conn={conn} setConn={setConn}/>;
      default:            return <DashboardScreen conn={conn}/>;
    }
  };

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <div className="sidebar">
          <div className="logo">
            <div className="logo-mark">one<span>aether</span>.ai</div>
            <div className="logo-sub">AI Business Platform</div>
          </div>
          <div className="nav">
            {NAV.map(s=>(
              <div key={s.section}>
                <div className="nav-section">{s.section}</div>
                {s.items.map(item=>(
                  <div key={item.id} className={`nav-item${screen===item.id?" active":""}`} onClick={()=>setScreen(item.id)}>
                    <span style={{fontSize:14}}>{item.icon}</span>
                    {item.label}
                    {item.isNew&&<span style={{marginLeft:"auto",background:"#7c4dff",color:"white",fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:10}}>NEW</span>}
                    {item.badge&&<span className="nav-badge">{item.badge}</span>}
                  </div>
                ))}
              </div>
            ))}
          </div>
          <div className="sidebar-footer">
            <div className="user-chip">
              <div className="user-av">OA</div>
              <div><div style={{fontSize:12,fontWeight:600}}>Admin</div><div style={{fontSize:10,color:"var(--text2)"}}>oneaether.ai</div></div>
            </div>
          </div>
        </div>
        <div className="main">
          <div className="topbar">
            <div>
              <div className="topbar-title">{meta.title}</div>
              <div className="topbar-sub">{meta.sub}</div>
            </div>
            <div className="topbar-right">
              {screen==="segments"&&<div style={{fontSize:12,color:"#a78bfa"}}>✦ Drag cards to reassign · Use AI tab for smart recommendations</div>}
              {screen==="whatsapp"&&conn.wapiOk&&<div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"var(--accent)"}}><div style={{width:7,height:7,borderRadius:"50%",background:"var(--accent)",animation:"pulse 2s infinite"}}/>Live · {conn.wapiChannelId}</div>}
            </div>
          </div>
          {render()}
        </div>
      </div>
    </>
  );
}


// Mount the app
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
